<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planner - Spartan Shield Saver</title>
    <link rel="stylesheet" href="../styles/Spartan.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-shell planner-shell">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="dashboard-main">
            <section class="hero-panel">
                <div>
                    <h1 id="planner-title">Event Planner</h1>
                    <p id="planner-subtitle" class="muted-text">Select or load an event</p>
                    <div id="event-selector-container" class="top-gap">
                        <select id="event-selector"></select>
                    </div>
                </div>
            </section>

            <section id="planner-error" class="panel hidden"></section>
            <section id="planner-content" class="panel hidden"></section>

            <script src="../scripts/sidebar.js"></script>
            <script src="../scripts/planner.js"></script>
        </main>
    </div>
</body>
</html>
